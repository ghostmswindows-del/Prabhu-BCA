<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .welcome-screen, .category-screen, .quiz-screen, .result-screen {
            display: none;
        }

        .welcome-screen.active, .category-screen.active, .quiz-screen.active, .result-screen.active {
            display: block;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 1.1em;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .category-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-size: 1.1em;
            font-weight: 600;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .question-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .question-number {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .question-text {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option {
            background: white;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.05em;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 30px auto 0;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }

        .result-card {
            text-align: center;
            padding: 40px;
        }

        .score-display {
            font-size: 4em;
            color: #667eea;
            font-weight: bold;
            margin: 30px 0;
        }

        .performance-badge {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: 600;
            margin: 20px 0;
        }

        .excellent {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .good {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .average {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .leaderboard {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .leaderboard h3 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .leaderboard-entry {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .rank {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }

        .emoji {
            font-size: 2em;
            margin-bottom: 20px;
        }

        .back-btn {
            background: #6c757d;
            margin-top: 15px;
        }
    </style>
</head>
<body>

        <!-- Category Selection Screen -->
        <div class="category-screen">

                </button>
                <button class="category-card" onclick="selectCategory('computer')">

            </div>
        </div>

        <!-- Quiz Screen -->
        <div class="quiz-screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <div id="quizContent"></div>
        </div>

        <!-- Result Screen -->
        <div class="result-screen">
            <div class="result-card">
                <div class="emoji" id="resultEmoji"></div>
                <h1>Quiz Complete!</h1>
                <div class="score-display" id="scoreDisplay"></div>
                <div class="performance-badge" id="performanceBadge"></div>

                <div class="leaderboard">

                </div>

                <button class="btn" onclick="restartQuiz()">Take Another Quiz</button>
                <button class="btn back-btn" onclick="backToCategories()">Change Category</button>
            </div>
        </div>
    </div>

        let userName = '';

        let score = 0;
        let userAnswers = [];
        let leaderboards = {};

        // Load leaderboards from memory
        const storedData = {};

        function startQuiz() {
            userName = document.getElementById('userName').value.trim();
            if (!userName) {
                alert('Please enter your name!');
                return;
            }
            document.querySelector('.welcome-screen').classList.remove('active');
            document.querySelector('.category-screen').classList.add('active');
            document.getElementById('displayName').textContent = userName;
        }

        function selectCategory(category) {
            currentCategory = category;
            currentQuestions = shuffleArray([...quizData[category]]).slice(0, 10);
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            
            document.querySelector('.category-screen').classList.remove('active');
            document.querySelector('.quiz-screen').classList.add('active');
            
            displayQuestion();
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function displayQuestion() {
            const question = currentQuestions[currentQuestionIndex];
            const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
            
            const quizContent = document.getElementById('quizContent');
            quizContent.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Question ${currentQuestionIndex + 1} of ${currentQuestions.length}</div>
                    <div class="question-text">${question.q}</div>
                    <div class="options">
                        ${question.options.map((opt, idx) => `
                            <div class="option" onclick="selectOption(${idx})" data-index="${idx}">
                                ${String.fromCharCode(65 + idx)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                </div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>
                    ${currentQuestionIndex < currentQuestions.length - 1 ? 'Next Question' : 'Finish Quiz'}
                </button>
            `;
        }

        function selectOption(index) {
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`[data-index="${index}"]`).classList.add('selected');
            userAnswers[currentQuestionIndex] = index;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (userAnswers[currentQuestionIndex] === currentQuestions[currentQuestionIndex].answer) {
                score++;
            }
            
            currentQuestionIndex++;
            
            if (currentQuestionIndex < currentQuestions.length) {
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const percentage = (score / currentQuestions.length) * 100;
            let performance, emoji, message, badgeClass;
            
            if (percentage >= 80) {
                performance = 'EXCELLENT';
                emoji = '🏆';
                message = 'Outstanding performance! You\'re a star!';
                badgeClass = 'excellent';
            } else if (percentage >= 60) {
                performance = 'GOOD';
                emoji = '👍';
                message = 'Well done! Keep up the good work!';
                badgeClass = 'good';
            } else {
                performance = 'AVERAGE';
                emoji = '📚';
                message = 'Good effort! Practice makes perfect!';
                badgeClass = 'average';
            }
            
            // Update leaderboard
            if (!leaderboards[currentCategory]) {
                leaderboards[currentCategory] = [];
            }
            
            leaderboards[currentCategory].push({
                name: userName,
                score: score,
                total: currentQuestions.length,
                percentage: percentage,
                timestamp: new Date().getTime()
            });
            
            // Sort leaderboard by score (descending)
            leaderboards[currentCategory].sort((a, b) => b.score - a.score || b.percentage - a.percentage);
            
            // Keep top 10
            leaderboards[currentCategory] = leaderboards[currentCategory].slice(0, 10);
            
            // Display results
            document.querySelector('.quiz-screen').classList.remove('active');
            document.querySelector('.result-screen').classList.add('active');
            
            document.getElementById('resultEmoji').textContent = emoji;
            document.getElementById('scoreDisplay').textContent = `${score}/${currentQuestions.length}`;
            document.getElementById('performanceBadge').textContent = performance;
            document.getElementById('performanceBadge').className = `performance-badge ${badgeClass}`;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('leaderboardCategory').textContent = getCategoryName(currentCategory);
            
            displayLeaderboard();
        }
        
        function getCategoryName(category) {
            const names = {
                reasoning: 'Reasoning',
                aptitude: 'Aptitude',
                english: 'English Communication',
                computer: 'Computer'
            };
            return names[category] || category;
        }
        
        function displayLeaderboard() {
            const leaderboardContent = document.getElementById('leaderboardContent');
            
            if (!leaderboards[currentCategory] || leaderboards[currentCategory].length === 0) {
                leaderboardContent.innerHTML = '<p style="text-align: center; color: #999;">No entries yet. Be the first!</p>';
                return;
            }
            
            leaderboardContent.innerHTML = leaderboards[currentCategory].map((entry, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                return `
                    <div class="leaderboard-entry">
                        <span class="rank">#${index + 1} ${medal}</span>
                        <span>${entry.name}</span>
                        <span style="font-weight: bold; color: #667eea;">${entry.score}/${entry.total}</span>
                    </div>
                `;
            }).join('');
        }
        
        function restartQuiz() {
            userName = '';
            currentCategory = '';
            currentQuestions = [];
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.welcome-screen').classList.add('active');
            document.getElementById('userName').value = '';
        }
        
        function backToCategories() {
            currentCategory = '';
            currentQuestions = [];
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = [];
            
            document.querySelector('.result-screen').classList.remove('active');
            document.querySelector('.category-screen').classList.add('active');
        }
    </script>
</body>
</html>
